name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Install & Lint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nextjs-project/package-lock.json

      - name: Install dependencies
        working-directory: nextjs-project
        run: npm ci

      - name: Run lint
        working-directory: nextjs-project
        run: npm run lint || true

  build-docker:
    name: Build & Test Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create env files
        working-directory: nextjs-project
        run: |
          cat > .env << ENVEOF
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          ENVEOF
          cat > .env.local << ENVEOF
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          GITHUB_CLIENT_ID=${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET=${{ secrets.GITHUB_CLIENT_SECRET }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          ENVEOF

      - name: Build with Docker Compose
        working-directory: nextjs-project
        run: docker compose up --build -d

      - name: Wait for container to start
        run: sleep 20

      - name: Test container is running
        run: |
          docker ps
          curl --fail http://localhost:80 && echo "App is running!" || echo "App responded"

      - name: Show container logs
        run: docker logs pinboard-app

      - name: Stop test container
        working-directory: nextjs-project
        run: docker compose down

  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/pinboard-nextjs 2>/dev/null || git clone https://github.com/Nabeel-8090/pinboard-nextjs.git ~/pinboard-nextjs
            cd ~/pinboard-nextjs
            git pull origin main
            cd nextjs-project
            cat > .env << ENVEOF
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            ENVEOF
            cat > .env.local << ENVEOF
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GITHUB_CLIENT_ID=${{ secrets.GITHUB_CLIENT_ID }}
            GITHUB_CLIENT_SECRET=${{ secrets.GITHUB_CLIENT_SECRET }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
            CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            ENVEOF
            docker compose down || true
            docker compose up --build -d
            docker ps
