name: Lint Check

on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: cd nextjs-project && npm install
      - name: Run Lint
        run: cd nextjs-project && npm run lint
