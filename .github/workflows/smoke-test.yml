name: Smoke Test

on: [push]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: cd nextjs-project && npm install
      - name: Run Smoke Test
        run: cd nextjs-project && npx jest testfile.test.js
